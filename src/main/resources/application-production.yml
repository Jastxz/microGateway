server:
  port: 5555

spring:
  application:
    name: micro-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Descubre servicios automáticamente
          lower-case-service-id: true # user-service en vez de USER-SERVICE

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:5555/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health
